version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: iot_dashboard_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: iot_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot_dashboard_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: iot_dashboard
      DB_USER: postgres
      DB_PASSWORD: postgres123
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot_network
    restart: unless-stopped

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile.simulator
    container_name: iot_dashboard_simulator
    environment:
      API_BASE_URL: http://backend:3000/api
    depends_on:
      - backend
    networks:
      - iot_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3000/api
        REACT_APP_SOCKET_URL: http://localhost:3000
    container_name: iot_dashboard_frontend
    ports:
      - "80:3000"
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - iot_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  iot_network:
    driver: bridge
